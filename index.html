<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>
    <div class="box">
        <h5>CALCULATOR</h5>
        <input type="text" placeholder="0">
        <div class="row1">
            <button class="des">AC</button>
            <button class="des">DEL</button>
            <button class="gre">/</button>
            <button class="gre">*</button>
        </div>
        <div class="row2">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="gre">-</button>
        </div>
        <div class="row3">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="gre">+</button>
        </div>
        <div class="row4">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="gre">00</button>
        </div>
        <div class="row4">
            <button class="gre">%</button>
            <button>0</button>
            <button class="gre">.</button>
            <button id="eql">=</button>

        </div>
    </div>
    <script src="calc.js"></script>
</body>
</html>
